<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Typewriter — Welcome in 5 languages</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #fff;
      margin: 0;
    }

    .typewriter {
      font-size: 2rem;
      border-right: 2px solid rgba(255, 255, 255, 0.6);
      padding-right: 6px;
      white-space: nowrap;
      overflow: hidden;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      animation: blink 1s steps(2, end) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0
      }
    }
  </style>
</head>

<body>
  <div class="typewriter" id="type"></div>

  <script>
    const phrases = [
      "Welcome",            // English
      "Bienvenido",         // Spanish
      "Bienvenue",          // French
      "欢迎",     // Chinese (Mandarin)
      "환영합니다", // Korean
      "Selamat Datang"
    ];

    const el = document.getElementById('type');

    const config = {
      typeSpeed: 80,    // ms per character while typing
      deleteSpeed: 40,  // ms per character while deleting
      pauseAfter: 1200, // ms to wait after full phrase shown
      pauseBetween: 400  // short pause before typing next
    };

    let phraseIndex = 0;
    let charIndex = 0;
    let typing = true;

    function tick() {
      const current = phrases[phraseIndex];
      if (typing) {
        charIndex++;
        el.textContent = current.slice(0, charIndex);
        if (charIndex === current.length) {
          typing = false;
          setTimeout(tick, config.pauseAfter);
          return;
        }
        setTimeout(tick, config.typeSpeed);
      } else {
        // deleting
        charIndex--;
        el.textContent = current.slice(0, charIndex);
        if (charIndex === 0) {
          typing = true;
          phraseIndex = (phraseIndex + 1) % phrases.length;
          setTimeout(tick, config.pauseBetween);
          return;
        }
        setTimeout(tick, config.deleteSpeed);
      }
    }

    // start
    tick();
  </script>
</body>

</html>
