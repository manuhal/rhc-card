<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>TypewriterJS Example</title>
  <script src="https://cdn.jsdelivr.net/npm/typewriter-effect@2.18.0/dist/core.js"></script>
  <style>body{font-family:system-ui;padding:40px}</style>
</head>
<body>
  <div id="typewriter"></div>

  <script>
    const phrases = [
      "Welcome",
      "Bienvenido",
      "Bienvenue",
      "欢迎 (Huānyíng)",
      "환영합니다 (Hwanyeonghamnida)"
    ];

    const target = document.getElementById('typewriter');
    const tw = new Typewriter(target, {
      loop: true,
      delay: 70,
      deleteSpeed: 40,
      cursor: '|'
    });

    phrases.forEach(p => {
      tw.typeString(p)
        .pauseFor(1200)
        .deleteAll()
    });
    tw.start();
  </script>
</body>
</html>
